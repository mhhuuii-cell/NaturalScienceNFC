<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NFC 1｜看不見的水如何變得可見？</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --background: #000;
      --surface: #111;
      --surface-raised: #1a1a1a;
      --border: #3f3f46;
      --text: #fff;
      --muted: #c4c4cc;
      --accent: #67e8f9;
      --accent-dark: #083344;
      --focus: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      background: var(--background);
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      background: var(--background);
      color: var(--text);
    }

    button {
      font: inherit;
    }

    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    main {
      width: min(100%, 100rem);
      min-height: 100vh;
      min-height: 100svh;
      margin: 0 auto;
      display: grid;
      gap: 0.75rem;
      padding:
        max(0.65rem, env(safe-area-inset-top))
        max(0.65rem, env(safe-area-inset-right))
        max(0.65rem, env(safe-area-inset-bottom))
        max(0.65rem, env(safe-area-inset-left));
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.8vw, 2rem);
      line-height: 1.2;
    }

    .progress {
      flex: none;
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.85rem, 1.7vw, 1rem);
      white-space: nowrap;
    }

    .learning-cycle {
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      background: var(--surface);
    }

    .learning-cycle li {
      min-height: 2.4rem;
      display: grid;
      place-items: center;
      padding: 0.35rem;
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-size: clamp(0.75rem, 1.7vw, 0.95rem);
      text-align: center;
    }

    .learning-cycle li:last-child {
      border-right: 0;
    }

    .learning-cycle li.current {
      background: var(--accent-dark);
      color: var(--accent);
      font-weight: 700;
    }

    .material-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0.5rem;
    }

    .material-tab {
      min-height: 3rem;
      padding: 0.55rem 0.7rem;
      border: 2px solid var(--border);
      border-radius: 0.65rem;
      background: var(--surface);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .material-tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent-dark);
      color: var(--accent);
    }

    .material-tab:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .media-stage {
      position: relative;
      width: 100%;
      min-height: clamp(18rem, 53svh, 49rem);
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid #262626;
      border-radius: 0.8rem;
      background: #050505;
    }

    .media-stage video,
    .media-stage img {
      width: 100%;
      height: 100%;
      max-height: 64rem;
      display: block;
      object-fit: contain;
      background: #000;
    }

    .media-placeholder {
      width: min(90%, 42rem);
      min-height: 14rem;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 0.8rem;
      padding: 2rem;
      border: 2px dashed #52525b;
      border-radius: 1rem;
      background: linear-gradient(145deg, #0d0d0f, #18181b);
      color: var(--muted);
      text-align: center;
    }

    .placeholder-mark {
      width: 4.5rem;
      height: 4.5rem;
      display: grid;
      place-items: center;
      border: 2px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      font-size: 2rem;
    }

    .media-placeholder strong {
      color: var(--text);
      font-size: clamp(1.25rem, 3vw, 2rem);
    }

    .media-placeholder p {
      margin: 0;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
    }

    .prompt-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 0.65rem;
    }

    .prompt-card {
      min-height: 4.8rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      background: var(--surface);
    }

    .prompt-card h2 {
      margin: 0 0 0.35rem;
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }

    .prompt-card p {
      margin: 0;
      font-size: clamp(0.95rem, 2vw, 1.2rem);
      line-height: 1.45;
    }

    .revision-card {
      border-color: #a16207;
      background: #211804;
    }

    .revision-card h2 {
      color: #fde047;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .control-button {
      min-width: min(100%, 13rem);
      min-height: 3.25rem;
      padding: 0.65rem 1.25rem;
      border: 2px solid #fff;
      border-radius: 0.7rem;
      background: #fff;
      color: #000;
      font-weight: 750;
      cursor: pointer;
      touch-action: manipulation;
    }

    .control-button.secondary {
      background: #000;
      color: #fff;
    }

    .control-button.model {
      border-color: var(--accent);
      background: var(--accent);
      color: #06242b;
    }

    .control-button:disabled {
      border-color: #3f3f46;
      background: #27272a;
      color: #71717a;
      cursor: not-allowed;
    }

    .teacher-note {
      flex-basis: 100%;
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }

    @media (orientation: landscape) and (min-width: 700px) {
      main {
        height: 100vh;
        height: 100svh;
        grid-template-rows: auto auto auto minmax(0, 1fr) auto auto;
        overflow: hidden;
      }

      .media-stage {
        min-height: 0;
        height: 100%;
      }
    }

    @media (max-width: 680px) {
      .page-header {
        display: block;
      }

      .progress {
        margin-top: 0.3rem;
      }

      .material-tabs {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .prompt-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="page-header">
      <h1 id="page-title">NFC 1｜看不見的水如何變得可見？</h1>
      <p id="evidence-progress" class="progress" aria-live="polite">證據 1／5</p>
    </header>

    <ol class="learning-cycle" aria-label="教學流程">
      <li id="phase-observe" class="current">觀察</li>
      <li id="phase-discuss">討論</li>
      <li id="phase-predict">預測</li>
      <li id="phase-teacher">老師決定</li>
      <li id="phase-revise">修正想法</li>
    </ol>

    <nav class="material-tabs" role="tablist" aria-label="真實證據素材，由老師操作">
      <button class="material-tab" type="button" role="tab" aria-selected="true" data-index="0">雲</button>
      <button class="material-tab" type="button" role="tab" aria-selected="false" data-index="1" disabled>霧</button>
      <button class="material-tab" type="button" role="tab" aria-selected="false" data-index="2" disabled>露</button>
      <button class="material-tab" type="button" role="tab" aria-selected="false" data-index="3" disabled>霜</button>
      <button class="material-tab" type="button" role="tab" aria-selected="false" data-index="4" disabled>熱水白色水氣</button>
    </nav>

    <section class="media-stage" aria-label="主媒體區">
      <video id="main-video" controls playsinline webkit-playsinline preload="metadata" hidden></video>
      <img id="main-photo" alt="" hidden>
      <div id="media-placeholder" class="media-placeholder" role="status">
        <span class="placeholder-mark" aria-hidden="true">▶</span>
        <strong id="placeholder-title">雲｜素材尚未放入</strong>
        <p id="placeholder-message">影片與照片補上後，這裡會自動顯示。</p>
      </div>
    </section>

    <section class="prompt-panel" aria-label="觀察與思考提示">
      <article class="prompt-card">
        <h2 id="prompt-label">觀察提示</h2>
        <p id="observation-prompt">白色區域從哪裡開始出現？它如何移動或消散？</p>
      </article>

      <article id="thinking-card" class="prompt-card">
        <h2 id="thinking-label">討論與預測</h2>
        <p id="thinking-prompt">先說出畫面中的證據，再預測下一個現象可能出現在空中或物體表面。</p>
      </article>
    </section>

    <section class="controls" aria-label="教師控制">
      <button id="next-evidence" class="control-button" type="button" disabled>下一個證據</button>
      <button id="show-model" class="control-button model" type="button">顯示概念模型</button>
      <button id="rewatch" class="control-button secondary" type="button">重新觀看</button>
      <p class="teacher-note">先完成觀察、討論與預測，再由老師決定何時顯示下一個證據或概念模型。</p>
    </section>
  </main>

  <script>
    const evidenceItems = [
      {
        id: 'cloud',
        label: '雲',
        video: '../media/video/cloud.mp4',
        photo: '../media/photo/cloud.jpg',
        prompt: '白色區域從哪裡開始出現？它如何移動或消散？'
      },
      {
        id: 'fog',
        label: '霧',
        video: '../media/video/fog.mp4',
        photo: '../media/photo/fog.jpg',
        prompt: '遠方景物的清晰度如何改變？白色區域最靠近哪裡？'
      },
      {
        id: 'dew',
        label: '露',
        video: '../media/video/dew.mp4',
        photo: '../media/photo/dew.jpg',
        prompt: '水滴最先出現在哪個表面？數量和大小如何改變？'
      },
      {
        id: 'frost',
        label: '霜',
        video: '../media/video/frost.mp4',
        photo: '../media/photo/frost.jpg',
        prompt: '表面的形狀如何隨時間改變？它和前一個證據有什麼不同？'
      },
      {
        id: 'kettle',
        label: '熱水白色水氣',
        video: '../media/video/kettle.mp4',
        photo: null,
        prompt: '壺口最近處和稍遠處，哪裡比較看得見白色區域？'
      }
    ];

    const conceptModel = {
      label: '概念模型',
      video: '../media/generated/water-visible-model.mp4'
    };

    const mainVideo = document.querySelector('#main-video');
    const mainPhoto = document.querySelector('#main-photo');
    const mediaPlaceholder = document.querySelector('#media-placeholder');
    const placeholderTitle = document.querySelector('#placeholder-title');
    const placeholderMessage = document.querySelector('#placeholder-message');
    const evidenceProgress = document.querySelector('#evidence-progress');
    const observationPrompt = document.querySelector('#observation-prompt');
    const promptLabel = document.querySelector('#prompt-label');
    const thinkingCard = document.querySelector('#thinking-card');
    const thinkingLabel = document.querySelector('#thinking-label');
    const thinkingPrompt = document.querySelector('#thinking-prompt');
    const nextEvidenceButton = document.querySelector('#next-evidence');
    const showModelButton = document.querySelector('#show-model');
    const rewatchButton = document.querySelector('#rewatch');
    const materialTabs = [...document.querySelectorAll('.material-tab')];
    const phaseItems = [...document.querySelectorAll('.learning-cycle li')];

    let currentEvidenceIndex = 0;
    let currentMode = 'evidence';
    let highestUnlockedEvidenceIndex = 0;
    let currentVideoCompleted = false;
    let replayAuthorized = false;

    function stopMedia() {
      mainVideo.pause();
      mainVideo.removeAttribute('src');
      mainVideo.load();
      mainPhoto.removeAttribute('src');
      mainVideo.hidden = true;
      mainPhoto.hidden = true;
      currentVideoCompleted = false;
      replayAuthorized = false;
    }

    function setPhase(phaseId) {
      phaseItems.forEach((item) => {
        item.classList.toggle('current', item.id === phaseId);
      });
    }

    function updateEvidenceTabs(selectedIndex = null) {
      materialTabs.forEach((tab, tabIndex) => {
        tab.disabled = tabIndex > highestUnlockedEvidenceIndex;
        tab.setAttribute('aria-selected', String(tabIndex === selectedIndex));
      });
    }

    function showPlaceholder(title, message) {
      mainVideo.hidden = true;
      mainPhoto.hidden = true;
      placeholderTitle.textContent = title;
      placeholderMessage.textContent = message;
      mediaPlaceholder.hidden = false;
    }

    function tryPhotoFallback(item) {
      if (!item.photo) {
        showPlaceholder(
          `${item.label}｜素材尚未放入`,
          '影片補上後，這裡會自動顯示。'
        );
        nextEvidenceButton.disabled = currentEvidenceIndex === evidenceItems.length - 1;
        return;
      }

      mainPhoto.onload = () => {
        mainVideo.hidden = true;
        mediaPlaceholder.hidden = true;
        mainPhoto.hidden = false;
        nextEvidenceButton.disabled = currentEvidenceIndex === evidenceItems.length - 1;
      };

      mainPhoto.onerror = () => {
        showPlaceholder(
          `${item.label}｜素材尚未放入`,
          '影片與照片補上後，這裡會自動顯示。'
        );
        nextEvidenceButton.disabled = currentEvidenceIndex === evidenceItems.length - 1;
      };

      mainPhoto.alt = `${item.label}的真實證據照片`;
      mainPhoto.src = item.photo;
    }

    function loadEvidence(index, isNewEvidence = false) {
      const item = evidenceItems[index];

      currentEvidenceIndex = index;
      currentMode = 'evidence';
      stopMedia();

      evidenceProgress.textContent = `${item.label}｜證據 ${index + 1}／${evidenceItems.length}`;
      promptLabel.textContent = '觀察提示';
      observationPrompt.textContent = item.prompt;

      updateEvidenceTabs(index);

      nextEvidenceButton.disabled = true;
      const shouldRevise = isNewEvidence || index > 0;
      thinkingCard.classList.toggle('revision-card', shouldRevise);
      thinkingLabel.textContent = shouldRevise ? '修正想法' : '討論與預測';
      thinkingPrompt.textContent = shouldRevise
        ? '新證據和原來的預測哪裡相同、哪裡不同？請指出畫面中的依據。'
        : '先說出畫面中的證據，再預測下一個現象可能出現在空中或物體表面。';
      setPhase(isNewEvidence || index > 0 ? 'phase-revise' : 'phase-observe');

      mainVideo.autoplay = false;
      mainVideo.loop = false;
      mainVideo.controls = true;

      showPlaceholder(`${item.label}｜正在載入`, '如果素材尚未放入，稍後會顯示占位畫面。');

      mainVideo.onloadeddata = () => {
        mediaPlaceholder.hidden = true;
        mainPhoto.hidden = true;
        mainVideo.hidden = false;
      };

      mainVideo.onerror = () => {
        tryPhotoFallback(item);
      };

      mainVideo.src = item.video;
      mainVideo.load();
    }

    function loadConceptModel() {
      currentMode = 'model';
      stopMedia();

      evidenceProgress.textContent = '概念模型｜老師決定後顯示';
      promptLabel.textContent = '回看任務';
      observationPrompt.textContent = '看完後，請回到任一真實證據，找出你現在才注意到的畫面。';
      thinkingCard.classList.add('revision-card');
      thinkingLabel.textContent = '修正想法';
      thinkingPrompt.textContent = '用新模型重新解釋一個畫面，並說明你修改了哪一個原來的想法。';
      updateEvidenceTabs();
      nextEvidenceButton.disabled = true;
      setPhase('phase-revise');
      mainVideo.controls = true;

      showPlaceholder('概念模型｜正在載入', '模型素材尚未放入時，頁面仍可回看真實證據。');

      mainVideo.onloadeddata = () => {
        mediaPlaceholder.hidden = true;
        mainPhoto.hidden = true;
        mainVideo.hidden = false;
      };

      mainVideo.onerror = () => {
        showPlaceholder('概念模型尚待製作', '請先回看真實證據並修正小組想法。');
      };

      mainVideo.src = conceptModel.video;
      mainVideo.load();
    }

    function rewatchCurrentMedia() {
      if (!mainVideo.hidden && Number.isFinite(mainVideo.duration)) {
        replayAuthorized = true;
        nextEvidenceButton.disabled = true;
        mainVideo.controls = true;
        mainVideo.currentTime = 0;
        const playRequest = mainVideo.play();

        if (playRequest) {
          playRequest.catch(() => {
            replayAuthorized = false;
          });
        }

        return;
      }

      if (currentMode === 'model') {
        loadConceptModel();
      } else {
        loadEvidence(currentEvidenceIndex, currentEvidenceIndex > 0);
      }
    }

    materialTabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const index = Number(tab.dataset.index);

        if (index > highestUnlockedEvidenceIndex) {
          return;
        }

        loadEvidence(index, index !== currentEvidenceIndex || index > 0);
      });
    });

    function holdOnFinalFrame() {
      if (Number.isFinite(mainVideo.duration) && mainVideo.duration > 0) {
        mainVideo.currentTime = Math.max(0, mainVideo.duration - 0.05);
      }
    }

    mainVideo.addEventListener('play', () => {
      if (currentVideoCompleted && !replayAuthorized) {
        mainVideo.pause();
        holdOnFinalFrame();
        return;
      }

      if (replayAuthorized) {
        replayAuthorized = false;
        currentVideoCompleted = false;
      }

      if (currentMode === 'evidence') {
        nextEvidenceButton.disabled = true;
      }
    });

    mainVideo.addEventListener('ended', () => {
      currentVideoCompleted = true;
      mainVideo.controls = false;

      if (currentMode === 'evidence' && currentEvidenceIndex < evidenceItems.length - 1) {
        nextEvidenceButton.disabled = false;
        setPhase('phase-teacher');
      }
    });

    nextEvidenceButton.addEventListener('click', () => {
      if (!nextEvidenceButton.disabled && currentEvidenceIndex < evidenceItems.length - 1) {
        const nextIndex = currentEvidenceIndex + 1;
        highestUnlockedEvidenceIndex = Math.max(highestUnlockedEvidenceIndex, nextIndex);
        loadEvidence(nextIndex, true);
      }
    });

    showModelButton.addEventListener('click', loadConceptModel);
    rewatchButton.addEventListener('click', rewatchCurrentMedia);

    loadEvidence(0);
  </script>
</body>
</html>
