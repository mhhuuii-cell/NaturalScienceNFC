<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- 每課替換：主題名稱 -->
  <title>雲與霧</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
    }

    main {
      width: 100%;
      height: 100vh;
      height: 100svh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      align-items: center;
      justify-items: center;
      gap: 0.35rem;
      overflow: hidden;
      padding: max(0.35rem, env(safe-area-inset-top))
        max(0.35rem, env(safe-area-inset-right))
        max(0.35rem, env(safe-area-inset-bottom))
        max(0.35rem, env(safe-area-inset-left));
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      font-weight: 600;
      line-height: 1.1;
      text-align: center;
    }

    .video-area {
      width: 100%;
      height: 100%;
      max-height: 85vh;
      max-height: 85svh;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 85vh;
      max-height: 85svh;
      object-fit: contain;
      background: #000;
    }

    .status {
      margin: 0;
      font-size: 0.95rem;
      text-align: center;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
    }

    .model-actions {
      flex-direction: column;
      align-items: center;
    }

    .discussion-prompt {
      margin: 0;
      font-size: 1rem;
      line-height: 1.4;
      text-align: center;
    }

    button {
      min-width: min(100%, 13rem);
      min-height: 3rem;
      padding: 0.55rem 1.25rem;
      border: 2px solid #fff;
      border-radius: 0.6rem;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    button.secondary {
      background: #000;
      color: #fff;
    }

    button:focus-visible {
      outline: 3px solid #7dd3fc;
      outline-offset: 3px;
    }

    @media (orientation: landscape) {
      main {
        gap: 0.25rem;
      }

      h1 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 id="section-title">真實證據</h1>

    <div class="video-area">
      <video id="real-video" controls playsinline webkit-playsinline preload="metadata">
        <!-- 每課替換：真實影片路徑 -->
        <source src="../media/cloud-real.mp4" type="video/mp4">
      </video>

      <video id="model-video" controls playsinline webkit-playsinline preload="metadata" hidden>
        <!-- 每課替換：概念模型影片路徑 -->
        <source src="../media/cloud-model.mp4" type="video/mp4">
      </video>
    </div>

    <p id="media-status" class="status" role="status" hidden>影片目前無法載入。</p>

    <div id="model-actions" class="actions model-actions" hidden>
      <!-- 每課替換：討論提示文字 -->
      <p class="discussion-prompt">請先完成小組討論，並等待老師指示。</p>
      <button id="show-model" type="button">觀看概念模型</button>
    </div>

    <div id="final-actions" class="actions" hidden>
      <button id="rewatch" type="button">重新觀看</button>
      <button id="go-back" class="secondary" type="button">返回</button>
    </div>
  </main>

  <script>
    const title = document.querySelector('#section-title');
    const realVideo = document.querySelector('#real-video');
    const modelVideo = document.querySelector('#model-video');
    const mediaStatus = document.querySelector('#media-status');
    const modelActions = document.querySelector('#model-actions');
    const finalActions = document.querySelector('#final-actions');
    const showModelButton = document.querySelector('#show-model');
    const rewatchButton = document.querySelector('#rewatch');
    const goBackButton = document.querySelector('#go-back');

    function hideStatus() {
      mediaStatus.hidden = true;
    }

    function showLoadError() {
      mediaStatus.hidden = false;
    }

    function resetVideo(video) {
      video.pause();
      video.load();
    }

    function showRealEvidence() {
      resetVideo(realVideo);
      resetVideo(modelVideo);
      title.textContent = '真實證據';
      realVideo.hidden = false;
      modelVideo.hidden = true;
      modelActions.hidden = true;
      finalActions.hidden = true;
      hideStatus();
    }

    function showConceptModel() {
      realVideo.pause();
      resetVideo(modelVideo);
      title.textContent = '概念模型';
      realVideo.hidden = true;
      modelVideo.hidden = false;
      modelActions.hidden = true;
      finalActions.hidden = true;
      hideStatus();
    }

    realVideo.addEventListener('ended', () => {
      modelActions.hidden = false;
    });

    modelVideo.addEventListener('ended', () => {
      finalActions.hidden = false;
    });

    realVideo.addEventListener('play', () => {
      modelActions.hidden = true;
      hideStatus();
    });

    modelVideo.addEventListener('play', () => {
      finalActions.hidden = true;
      hideStatus();
    });

    realVideo.addEventListener('error', () => {
      if (realVideo.hidden) {
        return;
      }

      showLoadError();
      modelActions.hidden = false;
    });

    modelVideo.addEventListener('error', () => {
      if (modelVideo.hidden) {
        return;
      }

      showLoadError();
      finalActions.hidden = false;
    });

    showModelButton.addEventListener('click', showConceptModel);
    rewatchButton.addEventListener('click', showRealEvidence);

    goBackButton.addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        showRealEvidence();
      }
    });
  </script>
</body>
</html>
